name: Publish IFC4.3 Output

on:
  workflow_dispatch:
  push:
    branches:
      - ifc4.3-main
      - ifc4.4-main

permissions:
  contents: read

concurrency:
  group: publish-ifc-output-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      REPO_DIR: ${{ github.workspace }}/ifc43
      TRANSLATIONS_SRC_DIR: ${{ github.workspace }}/translations/translations
      TRANSLATIONS_BUILD_DIR: ${{ github.workspace }}/translations-build
      PO_HASH_PATH: ${{ github.workspace }}/translations-build/po_hash_map.json
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Set target site directory
        shell: bash
        run: |
          set -euxo pipefail

          case "${GITHUB_REF_NAME}" in
            ifc4.3-main)
              echo "TARGET_SITE_DIR=${GITHUB_WORKSPACE}/output-repo/IFC/RELEASE/IFC4_3" >> "$GITHUB_ENV"
              ;;
            ifc4.4-main)
              echo "TARGET_SITE_DIR=${GITHUB_WORKSPACE}/output-repo/IFC/RELEASE/IFC4_4" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}"
              exit 1
              ;;
          esac

      - name: Check out source repository
        uses: actions/checkout@v4
        with:
          path: ifc43
          fetch-depth: 1

      - name: Capture source commit message
        working-directory: ifc43
        shell: bash
        run: |
          set -euxo pipefail
          {
            echo "SOURCE_COMMIT_MESSAGE<<EOF"
            git log -1 --pretty=%B
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Check out sample models
        uses: actions/checkout@v4
        with:
          repository: buildingSMART/IFC4.3.x-sample-models
          path: examples
          fetch-depth: 1

      - name: Check out translations
        uses: actions/checkout@v4
        with:
          repository: buildingSMART/IFC4.3.x-output
          ref: translations
          path: translations
          fetch-depth: 1

      - name: Check out output repository
        uses: actions/checkout@v4
        with:
          repository: buildingSMART/IFC4.3.x-output-2
          path: output-repo
          fetch-depth: 1
          token: ${{ secrets.OUTPUT_2_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ifc43/code/requirements.txt

      - name: Install system dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y graphviz rsync unzip

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install "Cython<3" wheel setuptools
          python -m pip install --no-build-isolation "PyYAML==6.0"
          python -m pip install --no-build-isolation reversestem
          python -m pip install -r ifc43/code/requirements.txt nltk
          python -m pip install ifcopenshell

      - name: Generate EXPRESS and XSD
        working-directory: ifc43/code
        shell: bash
        run: |
          set -euxo pipefail
          python -m generators.express ../schemas/ifc4x3_add2.uml \
            --output ../output/IFC.exp \
            --with-xsd \
            --xsd-output ../output/IFC.xsd

      - name: Generate property sets
        working-directory: ifc43/code
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ../output/psd
          python -m generators.pset ../schemas/ifc4x3_add2.uml --output ../output/psd

      - name: Generate bSDD export
        working-directory: ifc43/code
        shell: bash
        run: |
          set -euxo pipefail
          python -m generators.bsdd ../schemas/ifc4x3_add2.uml --output ../output/bsdd

      - name: Generate JSON schema structure
        working-directory: ifc43/code
        shell: bash
        run: |
          set -euxo pipefail
          python -m generators.json ../schemas/ifc4x3_add2.uml ../output/psd --output ../output/structure.json

      - name: Build static HTML site
        working-directory: ifc43/code
        shell: bash
        run: |
          set -euxo pipefail
          python -m generators.html --output ../output/html -j 4

      - name: Sync site into output repository
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$TARGET_SITE_DIR"
          rsync -a --delete "${GITHUB_WORKSPACE}/ifc43/output/html/" "${TARGET_SITE_DIR}/"

      - name: Commit and push output
        working-directory: output-repo
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "bSI-Bot"
          git config user.email ${{ secrets.BSI_BOT_EMAIL }}
          git add -A "${TARGET_SITE_DIR}"
          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi
          git commit -m "${SOURCE_COMMIT_MESSAGE}"
          git push
